name: Build resume PDF

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

# Used for Fontist caching
permissions:
  contents: read
  actions: write

jobs:
  build-cv:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - uses: fontist/setup-fontist@v2
    - run: fontist install "IBM Plex Sans"
      
    - name: Install Typst
      uses: typst-community/setup-typst@v5

    - name: Build PDFs
      env:
        TYPST_ROOT: ${{ github.workspace }}
      run: |
        mkdir -p static/fr static/en

        typst compile "resume/cv_content_fr.typ" "static/fr/CV_Arsène_Reymond.pdf" --font-path ~/.fontist/fonts/
        typst compile "resume/cv_content_en.typ" "static/en/CV_Arsène_Reymond.pdf" --font-path ~/.fontist/fonts/

        echo "Generated files:"
        find . -type f -name "*.pdf"
        
    - name: Upload PDFs
      uses: actions/upload-artifact@v7
      with:
        name: resume-docs
        path: |
          static/**/*.pdf