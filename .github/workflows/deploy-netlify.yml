name: Deploy to Netlify

on:
  workflow_run:
    workflows: ["Build resume PDF"]
    types: [completed]
    branches: [develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (
        (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'develop') ||
        github.event.workflow_run.event == 'pull_request'
      )
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download built resume files
        uses: actions/download-artifact@v8
        with:
          name: resume-docs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Netlify (Production)
        if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'develop'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          pnpm netlify deploy \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message="Deploy from commit ${{ github.event.workflow_run.head_sha }}" \
            --context=production \
            --prod

      - name: Deploy to Netlify (Preview)
        if: github.event.workflow_run.event == 'pull_request'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          PR_TITLE="${{ github.event.workflow_run.pull_requests[0].title }}"
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          DEPLOY_URL=$(pnpm netlify deploy \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --context=deploy-preview \
            --message="${PR_TITLE}" \
            --alias="deploy-preview-${PR_NUMBER}" \
            --json | jq -r '.deploy_url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Comment PR with deployment URL
        if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].number
        uses: actions/github-script@v9
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const pullRequest = context.payload.workflow_run.pull_requests[0];
            const prNumber = pullRequest.number;
            const commitSha = context.payload.workflow_run.head_sha.substring(0, 7);

            const body = `
            ### :white_check_mark: Deploy preview ready!

            | Name | Link |
            |------|------|
            | :hammer: Latest commit | ${commitSha} |
            | :camera_flash: Deploy preview | [${deployUrl}](${deployUrl}) |
            `;
            
            const comments = await github.rest.issues.listComments({
                          issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('### :white_check_mark: Deploy preview ready!')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
