name: Deploy to Netlify

on:
  workflow_call:
    inputs:
      deployTarget:
        description: "production or preview"
        required: true
        type: string
      commitSha:
        description: "Commit SHA used for checkout and deployment metadata"
        required: true
        type: string
      prNumber:
        description: "Pull request number for preview deployments"
        required: false
        type: string
      prTitle:
        description: "Pull request title for preview deployments"
        required: false
        type: string
    secrets:
      NETLIFY_AUTH_TOKEN:
        required: true
      NETLIFY_SITE_ID:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commitSha }}

      - name: Download built resume files
        uses: actions/download-artifact@v8
        with:
          name: resume-docs
          path: ./static

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Deploy to Netlify (Production)
        if: inputs.deployTarget == 'production'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          pnpm netlify deploy \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message="Deploy from commit ${{ inputs.commitSha }}" \
            --created-via=github-actions \
            --no-build \
            --dir=./build \
            --prod

      - name: Deploy to Netlify (Preview)
        if: inputs.deployTarget == 'preview'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          PR_TITLE="${{ inputs.prTitle }}"
          PR_NUMBER="${{ inputs.prNumber }}"
          DEPLOY=$(pnpm netlify deploy \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message="${PR_TITLE}" \
            --alias="deploy-preview-${PR_NUMBER}" \
            --created-via=github-actions \
            --no-build \
            --dir=./build \
            --json)
          
          echo DEPLOY_URL=$(echo "$DEPLOY" | jq -r '.deploy_url') >> $GITHUB_ENV
          echo "Deploy output: $DEPLOY"

      - name: Comment PR with deployment URL
        if: inputs.deployTarget == 'preview' && inputs.prNumber != ''
        uses: actions/github-script@v9
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const prNumber = Number('${{ inputs.prNumber }}');
            const commitSha = '${{ inputs.commitSha }}'.substring(0, 7);

            const body = `
            ### :white_check_mark: Deploy preview ready!

            | Name | Link |
            |------|------|
            | :hammer: Latest commit | ${commitSha} |
            | :camera_flash: Deploy preview | [${deployUrl}](${deployUrl}) |
            `;

            const comments = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existingComment = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('### :white_check_mark: Deploy preview ready!')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }